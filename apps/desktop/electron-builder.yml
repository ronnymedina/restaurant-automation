appId: com.restaurants.desktop
productName: Restaurantes
directories:
  output: dist-electron
files:
  - dist/**/*
extraResources:
  - from: ../../apps/api-core/dist-binary/
    to: bin/
    filter:
      - "api-core-*"
  - from: resources/
    to: resources/
mac:
  category: public.app-category.business
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: resources/icon.icns
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
publish: null
